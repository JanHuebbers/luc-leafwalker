name: luc-leafwalker

channels:
  - conda-forge
  - bioconda
  - defaults

dependencies:
  # Core language versions used in this repository
  - python=3.10.16
  - r-base=4.4.3

  # Python packages for input generation, data handling,
  # Excel I/O, plotting, and YAML-based configuration
  - pandas
  - numpy
  - openpyxl
  - matplotlib
  - pyyaml
  - xlsxwriter

  # R packages installed through Conda.
  # These provide the main R analysis stack and support
  # statistical testing and model-related dependencies.
  - r-essentials   # includes tidyverse, Rcpp, and other common R packages
  - r-devtools
  - r-nloptr       # dependency required by lme4
  - r-lme4         # dependency required by pbkrtest
  - r-pbkrtest     # dependency required by car
  - r-car          # dependency required by rstatix
  - r-ggstar
  - r-svglite
  - r-showtext

  # System/build libraries required for compiling selected R packages
  # and their native dependencies inside the Conda environment
  - cmake          # needed for building packages such as s2/abseil-related deps
  - zlib           # compression library needed by several compiled packages
  - cairo          # graphics backend needed for packages such as gdtools
  - expat          # XML parsing dependency used by font/rendering libraries
  - freetype       # font rendering library used by graphics-related packages
  - pkg-config     # helps package configure scripts locate system libraries
  - compilers      # provides C/C++/Fortran compilers for source package builds

  # Allow pip installs for packages not managed through Conda
  - pip

  # Python packages installed via pip only
  - pip:
    - biopython
    - hydride